[package]
name = "openrouter-auto"
version = "0.1.0"
edition = "2021"
description = "Rust SDK for OpenRouter API — auto-configure and use any model"
license = "MIT"
repository = "https://github.com/faraz152/openrouter-auto-connect"
homepage = "https://github.com/faraz152/openrouter-auto-connect"
readme = "../../README.md"
keywords = ["openrouter", "ai", "llm", "sdk", "openai"]
categories = ["api-bindings", "web-programming::http-client"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
reqwest = { version = "0.12", features = ["json", "stream"] }
tokio = { version = "1", features = ["full"] }
tokio-stream = "0.1"
once_cell = "1"
futures-util = "0.3"

[dev-dependencies]
tokio = { version = "1", features = ["full", "test-util"] }
wiremock = "0.6"
